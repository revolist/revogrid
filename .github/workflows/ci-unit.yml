name: CI Unit

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-unit-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test -- --runInBand --json --outputFile=jest-results.json || true

      - name: Write job summary
        if: always()
        run: |
          echo "## Unit Test Results" >> $GITHUB_STEP_SUMMARY
          if [ -f jest-results.json ]; then
            TOTAL=$(node -p "require('./jest-results.json').numTotalTests")
            PASSED=$(node -p "require('./jest-results.json').numPassedTests")
            FAILED=$(node -p "require('./jest-results.json').numFailedTests")
            SKIPPED=$(node -p "require('./jest-results.json').numPendingTests")
            SUITES=$(node -p "require('./jest-results.json').numTotalTestSuites")
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "| Result | Count |" >> $GITHUB_STEP_SUMMARY
            echo "|---|---|" >> $GITHUB_STEP_SUMMARY
            echo "| ✅ Passed | $PASSED |" >> $GITHUB_STEP_SUMMARY
            echo "| ❌ Failed | $FAILED |" >> $GITHUB_STEP_SUMMARY
            echo "| ⏭️ Skipped | $SKIPPED |" >> $GITHUB_STEP_SUMMARY
            echo "| 📦 Total | $TOTAL |" >> $GITHUB_STEP_SUMMARY
            echo "| 🗂️ Suites | $SUITES |" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "| | |" >> $GITHUB_STEP_SUMMARY
            echo "|---|---|" >> $GITHUB_STEP_SUMMARY
            echo "| Branch | \`${{ github.ref_name }}\` |" >> $GITHUB_STEP_SUMMARY
            echo "| Commit | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          fi
          node -e "
            const r = require('./jest-results.json');
            if (r.numFailedTests > 0) process.exit(1);
          "
