name: Publish NPM
on:
  release:
    types: [created]
permissions: write-all
jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      MCP_WEBHOOK_TOKEN: ${{ secrets.MCP_WEBHOOK_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          repository: revolist/revogrid-actions
          ref: main
          path: ./actions
          token: ${{ secrets.REPO_TOKEN }}
      - name: Release grid new version
        uses: ./actions/release-grid
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          npm_token: ${{ secrets.NPM_TOKEN }}

      - name: Pack npm release artifact
        run: |
          mkdir -p release-assets
          npm pack --pack-destination release-assets

      - name: Upload release assets
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*.tgz

      - name: Notify MCP index update
        if: startsWith(github.ref, 'refs/tags/') && env.MCP_WEBHOOK_TOKEN != ''
        run: |
          curl -X POST https://mcp.rv-grid.com/hooks/reindex \
            -H "Content-Type: application/json" \
            -H "X-Webhook-Token: ${MCP_WEBHOOK_TOKEN}" \
            -d '{"updateSources":true}'
  sbom:
    needs: publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Generate SBOM (SPDX)
        uses: anchore/sbom-action@v0
        with:
          path: .
          format: spdx-json
          output-file: sbom.spdx.json
          upload-release-assets: true
      - name: Generate SBOM (CycloneDX)
        uses: anchore/sbom-action@v0
        with:
          path: .
          format: cyclonedx-json
          output-file: sbom.cdx.json
          upload-release-assets: true
  update_submodules:
    needs: publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          repository: revolist/revogrid-actions
          ref: main
          path: ./actions
          token: ${{ secrets.REPO_TOKEN }}
      - name: Update submodules
        uses: ./actions/update-submodules
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          repo_token: ${{ secrets.REPO_TOKEN }}
      
